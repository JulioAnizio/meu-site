<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Julio Anizio | Agência</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}

.link-card{
  text-decoration:none;
  color:#fff;
  transition:0.3s;
  display:block;
}

.link-card:hover{
  transform:translateY(-5px) scale(1.02);
  box-shadow:0 15px 40px rgba(0,0,0,0.4);
}

.card p{
  margin-top:10px;
  font-weight:600;
}

body{
  background:linear-gradient(180deg,#0f172a,#020617);
  color:#fff;
}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:20px;
}

.logo{
  width:140px;
  background:#fff;
  padding:10px;
  border-radius:14px;
}

/* LANG */
.lang button{
  margin-left:6px;
  padding:6px 10px;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

/* HERO */
.hero{
  text-align:center;
  padding:80px 20px;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:20px;
}

.hero h1{
  font-size:32px;
}

.hero p{
  color:#cbd5f5;
}

/* BOTÕES */
.hero-buttons{
  display:flex;
  flex-direction:column;
  width:100%;
  max-width:320px;
  gap:12px;
  margin-top:10px;
}

.btn{
  width:100%;
  text-align:center;
  background:#3b82f6;
  padding:14px;
  border-radius:12px;
  color:#fff;
  text-decoration:none;
  font-weight:600;
  transition:0.3s;
}

.btn:hover{
  transform:translateY(-2px);
  box-shadow:0 10px 30px rgba(59,130,246,0.4);
}

/* SEÇÕES */
.section{
  padding:70px 20px;
  text-align:center;
}

.section h2{
  margin-bottom:30px;
}

.grid{
  display:grid;
  gap:20px;
}

.card{
  background:#1e293b;
  padding:20px;
  border-radius:14px;
}

/* PORTFOLIO IMG */
.card img{
  width:100%;
  border-radius:10px;
}

/* MAP */
iframe{
  border-radius:12px;
  margin-top:15px;
}

/* FOOTER */
.footer{
  text-align:center;
  padding:40px;
  background:#020617;
}

/* WHATS */
.whatsapp{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#25D366;
  padding:16px;
  border-radius:50%;
  color:#fff;
  text-decoration:none;
  font-size:20px;
}
</style>
</head>

<body>

<div class="header">
<img src="assets/logoJulio.png" class="logo">

<div class="lang">
<button onclick="setLang('pt')">PT</button>
<button onclick="setLang('en')">EN</button>
<button onclick="setLang('es')">ES</button>
</div>
</div>

<section class="hero">
<h1 id="title"></h1>
<p id="desc"></p>

<div class="hero-buttons">

<a href="https://wa.me/5547999500750?text=Vim%20pelo%20seu%20site,%20quero%20um%20igual" class="btn" id="cta1"></a>

<a href="index.html" class="btn" style="background:#64748b;" id="cta2"></a>

<a href="https://instagram.com/juliodev.full" class="btn" style="background:#e1306c;">
📸 Instagram
</a>

</div>
</section>

<section class="section">
<h2 id="servicesTitle"></h2>

<div class="grid">
<div class="card" id="s1"></div>
<div class="card" id="s2"></div>
<div class="card" id="s3"></div>
</div>
</section>

<section class="section">
<h2 id="portfolioTitle"></h2>

<div class="grid">
<section class="portfolio">
<h2>Projetos</h2>

<div class="grid">

<div class="card">
<img src="assets/marandu_clean.png">
<p>Agropecuária Marandú</p>
<a href="https://julioanizio.github.io/marandu/" target="_blank">Ver site →</a>
</div>

<div class="card">
<img src="assets/ovidio_clean.png">
<p>Ovídio dos Santos</p>
<a href="https://julioanizio.github.io/site_ovidio/" target="_blank">Ver site →</a>
</div>

</div>
</section>
</div>
</section>

<section class="section">
<h2 id="locationTitle"></h2>
<p>Avenida Nilo Simas, 162, Itajaí - SC</p>

<iframe src="https://www.google.com/maps?q=Avenida+Nilo+Simas+162+Itajai+SC&output=embed"
width="100%" height="300"></iframe>
</section>

<div class="footer">
<p>© Julio Anizio</p>
</div>

<a class="whatsapp" href="https://wa.me/5547999500750?text=Vim%20pelo%20seu%20site,%20quero%20um%20igual">💬</a>

<script>
const c={
pt:["Sites que vendem","Criação de sites profissionais","Quero meu site","Versão simples","Serviços","Design moderno","Responsivo","SEO","Projetos","Localização"],
en:["Websites that sell","Professional websites","I want my site","Simple version","Services","Modern design","Responsive","SEO","Projects","Location"],
es:["Sitios que venden","Sitios profesionales","Quiero mi sitio","Versión simple","Servicios","Diseño moderno","Responsivo","SEO","Proyectos","Ubicación"]
};

function setLang(l){
document.getElementById("title").innerText=c[l][0];
document.getElementById("desc").innerText=c[l][1];
document.getElementById("cta1").innerText=c[l][2];
document.getElementById("cta2").innerText=c[l][3];
document.getElementById("servicesTitle").innerText=c[l][4];
document.getElementById("s1").innerText=c[l][5];
document.getElementById("s2").innerText=c[l][6];
document.getElementById("s3").innerText=c[l][7];
document.getElementById("portfolioTitle").innerText=c[l][8];
document.getElementById("locationTitle").innerText=c[l][9];
}

setLang('pt');
</script>

</body>
</html>
