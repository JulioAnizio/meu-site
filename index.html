*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}

body{
  background:#fff;
  color:#1f2937;
}

/* BARRA SUPERIOR */
.topbar{
  background:linear-gradient(90deg,#2563eb,#1d4ed8);
  color:#fff;
  text-align:center;
  padding:8px;
  font-size:14px;
}

/* HEADER */
.header{
  display:flex;
  justify-content:center;
  align-items:center;
  padding:15px;
  background:#fff;
}

.logo{
  height:60px;
}

/* HERO / BANNER PRINCIPAL (MÓVIDO PARA O LUGAR DA FOTO) */
.hero{
  background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('assets/og-image.jpg') center/cover no-repeat;
  min-height: 80vh;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding: 40px 20px;
}

.hero-content{
  color:#fff;
  max-width:700px;
}

.hero h1{
  font-size:48px;
  font-weight: 700;
  margin-bottom:15px;
}

.hero p{
  font-size: 18px;
  margin-bottom:30px;
  color:#efefef;
}

/* BOTÕES NA POSIÇÃO ORIGINAL */
.hero-buttons{
  display:flex;
  flex-direction: column;
  align-items: center;
  gap:15px;
}

.btn{
  background:#2563eb;
  color:#fff;
  padding:16px 40px;
  border-radius:12px;
  text-decoration:none;
  transition:0.3s;
  font-weight: 600;
  width: 100%;
  max-width: 320px;
  text-align: center;
  font-size: 18px;
}

.btn.secondary{
  background: #fff;
  color: #2563eb;
}

.btn:hover{
  transform: scale(1.02);
  opacity: 0.9;
}

/* PORTFOLIO */
.portfolio{
  padding:60px 20px;
  text-align:center;
}

.grid{
  display:grid;
  grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
  gap:25px;
  max-width: 1100px;
  margin: 0 auto;
}

.card{
  background:#fff;
  padding:20px;
  border-radius:15px;
  box-shadow:0 10px 30px rgba(0,0,0,0.1);
  border: 1px solid #eee;
}

.card img{
  width: 100%;
  border-radius:10px;
  margin-bottom: 15px;
}

/* WHATSAPP FLUTUANTE */
.whatsapp{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#25D366;
  width: 60px;
  height: 60px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius:50%;
  color:#fff;
  text-decoration:none;
  font-size: 24px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.2);
  z-index: 999;
}

@media(max-width:768px){
  .hero h1{ font-size: 32px; }
}
