<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Julio Anizio | Criação de Sites</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}

body{
  background:linear-gradient(180deg,#ffffff 0%,#eaf2ff 100%);
  color:#1f2937;
}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:20px;
  background:#fff;
}

.logo{height:55px;}

/* HERO */
.hero{
  display:flex;
  flex-wrap:wrap;
  align-items:center;
  padding:70px 20px;
  gap:40px;
}

.hero-text{flex:1;}

.hero h1{font-size:36px;margin-bottom:10px;}
.hero p{margin-bottom:20px;color:#555;}

.hero img{
  width:240px;
  border-radius:50%;
}

/* BOTÕES */
.hero-buttons{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}

.btn{
  background:#2563eb;
  color:#fff;
  padding:14px 20px;
  border-radius:12px;
  text-decoration:none;
  transition:0.3s;
}

.btn:hover{
  background:#1d4ed8;
}

.secondary{
  background:transparent;
  color:#2563eb;
  border:2px solid #2563eb;
}

/* PORTFOLIO */
.portfolio{
  padding:80px 20px;
  text-align:center;
}

.grid{
  display:grid;
  gap:25px;
}

.card{
  background:#fff;
  padding:20px;
  border-radius:15px;
  box-shadow:0 10px 30px rgba(0,0,0,0.1);
  transition:0.3s;
}

.card:hover{
  transform:translateY(-5px);
}

.card img{
  width:100%;
  border-radius:10px;
}

.card a{
  display:inline-block;
  margin-top:10px;
  color:#2563eb;
  font-weight:600;
  text-decoration:none;
}

/* LOCAL */
.location{
  padding:60px 20px;
  text-align:center;
}

iframe{
  margin-top:15px;
  border-radius:12px;
}

/* FOOTER */
.footer{
  background:#111;
  color:#fff;
  text-align:center;
  padding:30px;
}

.footer a{
  color:#fff;
  display:block;
  margin-top:10px;
  text-decoration:none;
}

/* WHATS */
.whatsapp{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#25D366;
  padding:15px;
  border-radius:50%;
  color:#fff;
  text-decoration:none;
}

/* MOBILE */
@media(max-width:768px){
  .hero{
    flex-direction:column;
    text-align:center;
  }

  .hero h1{
    font-size:26px;
  }

  .hero-buttons{
    flex-direction:column;
    width:100%;
  }

  .btn{
    width:100%;
    text-align:center;
  }
}
</style>
</head>

<body>

<div class="header">
<img src="assets/logoJulio.png" class="logo">
</div>

<div class="hero">
<div class="hero-text">
<h1>Criação de sites profissionais</h1>
<p>Ajudo empresas a vender mais com presença online.</p>

<div class="hero-buttons">
<a href="https://wa.me/5547999500750?text=Vim%20pelo%20seu%20site,%20quero%20um%20igual" class="btn">
WhatsApp
</a>

<a href="agencia.html" class="btn secondary">
Versão completa
</a>
</div>
</div>

<img src="assets/fotoJulio.png">
</div>

<section class="portfolio">
<h2>Projetos</h2>

<div class="grid">

<div class="card">
<img src="assets/marandu_clean.png">
<p>Agropecuária Marandú</p>
<a href="https://julioanizio.github.io/marandu/" target="_blank">Ver site →</a>
</div>

<div class="card">
<img src="assets/ovidio_clean.png">
<p>Ovídio dos Santos</p>
<a href="https://julioanizio.github.io/site_ovidio/" target="_blank">Ver site →</a>
</div>

</div>
</section>

<section class="location">
<h2>Localização</h2>
<p>Avenida Nilo Simas, 162, Itajaí - SC</p>

<iframe src="https://www.google.com/maps?q=Avenida+Nilo+Simas+162+Itajai+SC&output=embed"
width="100%" height="300"></iframe>
</section>

<div class="footer">
<p>© Julio Anizio</p>

<a href="https://instagram.com/juliodev.full" target="_blank">

</div>

</body>
</html>
