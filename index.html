<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Julio Pereira | Criação de Sites</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}

body{
  background:linear-gradient(180deg,#ffffff 0%,#eaf2ff 100%);
  color:#1f2937;
}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:20px;
  background:#fff;
}

.logo{height:50px;}

/* HERO */
.hero{
  display:flex;
  flex-wrap:wrap;
  align-items:center;
  padding:60px 20px;
  gap:30px;
}

.hero-text{flex:1;}

.hero h1{font-size:32px;margin-bottom:10px;}
.hero p{margin-bottom:20px;color:#555;}

.hero img{
  width:220px;
  border-radius:50%;
}

/* BOTÕES */
.hero-buttons{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}

.btn{
  background:#2563eb;
  color:#fff;
  padding:12px 18px;
  border-radius:10px;
  text-decoration:none;
}

.secondary{
  background:transparent;
  color:#2563eb;
  border:2px solid #2563eb;
}

/* PORTFOLIO */
.portfolio{
  padding:60px 20px;
  text-align:center;
}

.grid{
  display:grid;
  gap:20px;
}

.card{
  background:#fff;
  padding:20px;
  border-radius:15px;
  box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

.card img{
  width:100%;
  border-radius:10px;
}

/* FOOTER */
.footer{
  background:#111;
  color:#fff;
  text-align:center;
  padding:30px;
}

/* WHATS */
.whatsapp{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#25D366;
  padding:15px;
  border-radius:50%;
  color:#fff;
  text-decoration:none;
}
</style>
</head>

<body>

<div class="header">
<img src="assets/logoJulio.png" class="logo">
</div>

<div class="hero">
<div class="hero-text">
<h1>Criação de sites profissionais</h1>
<p>Ajudo empresas a vender mais com presença online.</p>

<div class="hero-buttons">
<a href="https://wa.me/5547999500750?text=Vim%20pelo%20seu%20site,%20quero%20um%20igual" class="btn">
WhatsApp
</a>

<a href="agencia.html" class="btn secondary">
Versão completa
</a>
</div>
</div>

<img src="assets/foto.jpg">
</div>

<section class="portfolio">
<h2>Projetos</h2>

<div class="grid">

<div class="card">
<img src="assets/marandu_clean.png">
<p>Marandú</p>
</div>

<div class="card">
<img src="assets/ovidio_clean.png">
<p>Ovídio</p>
</div>

</div>
</section>

<div class="footer">
<p>© Julio Pereira</p>
</div>

<a class="whatsapp" href="https://wa.me/5547999500750?text=Vim%20pelo%20seu%20site,%20quero%20um%20igual">💬</a>

</body>
</html>
